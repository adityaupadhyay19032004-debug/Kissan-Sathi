<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crop Health | KisaanSaathi</title>

<style>
    :root {
        --bg: #ffffff;
        --text: #1b3c1a;
        --sidebar-bg: #0f6819;
        --card-bg: #f2fbf3;
        --btn-bg: #0f6819;
        --btn-text: #ffffff;
        --border: #c7efcd;
    }
    body.dark {
        --bg: #0b1a0d;
        --text: #d9ffe0;
        --sidebar-bg: #06230c;
        --card-bg: #14301a;
        --btn-bg: #1b8f33;
        --btn-text: #ffffff;
        --border: #1b8f33;
    }

    body{margin:0;display:flex;font-family:Arial;background:var(--bg);color:var(--text);transition:.3s;}

    .sidebar{width:230px;background:var(--sidebar-bg);height:100vh;padding:20px;position:fixed;}
    .sidebar h2{text-align:center;color:var(--btn-text);margin-bottom:35px;}
    .menu a{color:var(--btn-text);display:block;padding:14px;text-decoration:none;margin-bottom:8px;border-radius:8px;}
    .menu a:hover,.menu a.active{background:var(--btn-text);color:var(--sidebar-bg);}

    .main{margin-left:240px;padding:20px;width:calc(100% - 240px);}
    .topbar{display:flex;justify-content:space-between;align-items:center;background:var(--card-bg);padding:14px 20px;border-radius:10px;margin-bottom:20px;}
    .topbar button{background:var(--btn-bg);color:var(--btn-text);padding:7px 14px;border:none;border-radius:7px;cursor:pointer;}

    .upload-box{background:var(--card-bg);padding:24px;border-radius:14px;border:1px solid var(--border);text-align:center;}
    .upload-area{margin-top:20px;border:2px dashed var(--btn-bg);padding:30px;border-radius:12px;cursor:pointer;transition:0.2s;}
    .upload-area:hover{background:#e6fbe9;}

    input[type="file"]{display:none;}
    #preview{width:100%;max-width:360px;border-radius:12px;margin-top:20px;display:none;}

    .analyze-btn{margin-top:20px;background:var(--btn-bg);color:var(--btn-text);padding:12px 24px;border:none;border-radius:10px;font-size:18px;cursor:pointer;}
    .analyze-btn:hover{opacity:0.9;}

    #resultBox{margin-top:25px;background:var(--card-bg);padding:20px;border-radius:12px;border:1px solid var(--border);display:none;}
    #resultText{font-size:19px;line-height:1.4;}

    @media(max-width:650px){
        .sidebar{position:relative;width:100%;height:auto;}
        .main{margin:0;width:100%;}
    }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🌾 KisaanSaathi</h2>
    <div class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="weather.html">Weather</a>
        <a href="crop-health.html" class="active">Crop Health</a>
        <a href="mandi.html">Mandi Prices</a>
        <a href="profile.html">Profile</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<!-- Main -->
<div class="main">

    <div class="topbar">
        <h3>🌱 Crop Health Detection</h3>
        <button onclick="toggleTheme()">🌙 / ☀</button>
    </div>

    <div class="upload-box">
        <h2>Upload a Crop Image</h2>
        <p>Upload or capture an image of your crop leaf to analyze its health.</p>

        <label class="upload-area" for="fileInput">📷 Click to Upload / Capture</label>
        <input type="file" id="fileInput" accept="image/*" capture="environment">

        <img id="preview" />

        <button class="analyze-btn" onclick="analyzeImage()">Analyze Crop Health</button>

        <div id="resultBox">
            <h3>🔍 Result</h3>
            <p id="resultText"></p>
        </div>
    </div>
</div>

<script>
/* ---------- Dark / Light Mode ---------- */
function toggleTheme(){
    document.body.classList.toggle("dark");
    localStorage.setItem("mode", document.body.classList.contains("dark") ? "dark":"light");
}
if(localStorage.getItem("mode") === "dark"){ document.body.classList.add("dark"); }

/* ---------- Image Preview ---------- */
document.getElementById("fileInput").addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        document.getElementById("preview").src = URL.createObjectURL(file);
        document.getElementById("preview").style.display = "block";
    }
});

/* ---------- Placeholder Analyze Function ---------- */
function analyzeImage(){
    const preview = document.getElementById("preview").style.display;
    const result = document.getElementById("resultBox");
    const text = document.getElementById("resultText");

    if(preview === "none"){
        alert("Please upload a crop image first.");
        return;
    }

    // 🔮 AI RESULT WILL BE FETCHED HERE IN FUTURE
    text.innerText = 
        "🔸 The crop appears healthy.\n" +
        "🔸 No visible disease symptoms detected.\n" +
        "🔸 Suggested Action: Continue regular care and irrigation.";

    result.style.display = "block";
}
</script>

</body>
</html>
