<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | KisaanSaathi</title>

<style>
    :root {
        --bg: #ffffff;
        --text: #1b3c1a;
        --card: #f2fbf3;
        --header: #0f6819;
        --btn-bg: #0f6819;
        --btn-text: #fff;
        --input-bg: #ffffff;
        --input-border: #0f6819;
    }
    body.dark {
        --bg: #0d1c0e;
        --text: #e5ffe7;
        --card: #14301a;
        --header: #06230c;
        --btn-bg: #1b8f33;
        --btn-text: #fff;
        --input-bg: #0b1c0e;
        --input-border: #1b8f33;
    }

    body { margin: 0; background: var(--bg); color: var(--text); font-family: Arial; transition: .3s; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: var(--header); color: var(--btn-text); }
    header .logo { font-size: 28px; font-weight: bold; cursor: pointer; }
    nav a { margin: 0 18px; color: var(--btn-text); text-decoration: none; font-size: 17px; }
    nav a:hover { text-decoration: underline; }

    .theme-btn {
        background: var(--btn-bg);
        border: none;
        padding: 7px 14px;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        color: var(--btn-text);
        margin-left: 12px;
    }

    .container { max-width: 900px; margin: auto; padding: 55px 20px; }
    h1 { font-size: 42px; text-align: center; }
    p.top-text { text-align: center; margin-bottom: 35px; font-size: 19px; }

    form { background: var(--card); padding: 35px; border-radius: 14px; }
    label { font-size: 18px; display: block; margin-top: 12px; }
    input, textarea {
        width: 100%; margin-top: 8px; font-size: 18px;
        padding: 12px; border-radius: 8px;
        border: 2px solid var(--input-border);
        background: var(--input-bg); color: var(--text);
    }
    textarea { resize: vertical; height: 140px; }

    .btn-submit {
        margin-top: 22px;
        padding: 14px;
        font-size: 20px;
        border: none;
        cursor: pointer;
        border-radius: 10px;
        width: 100%;
        background: var(--btn-bg);
        color: var(--btn-text);
    }
    .btn-submit:hover { opacity: 0.9; }

    .success-msg {
        text-align: center;
        font-size: 20px;
        margin-top: 20px;
        color: green;
        display: none;
    }

    footer { background: var(--header); text-align: center; padding: 18px; margin-top: 55px; color: var(--btn-text); }

    @media(max-width:650px) {
        header { flex-direction: column; padding: 20px; }
        h1 { font-size: 34px; }
    }
</style>
</head>

<body>
<header>
    <div class="logo" onclick="home()">🌾 KisaanSaathi</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" style="text-decoration: underline;">Contact</a>
        <button class="theme-btn" onclick="toggleTheme()">🌙 Dark / ☀ Light</button>
    </nav>
</header>

<div class="container">
    <h1>Contact KisaanSaathi</h1>
    <p class="top-text">Have any questions or need help? Send us a message — we are here for every farmer.</p>

    <form onsubmit="return submitForm(event)">
        <label>Your Name</label>
        <input type="text" id="name" required>

        <label>Email / Phone</label>
        <input type="text" id="contact" required>

        <label>Message</label>
        <textarea id="message" required></textarea>

        <button class="btn-submit">Submit</button>
    </form>

    <div class="success-msg" id="success">Thank you! Your message has been sent ✔</div>
</div>

<footer>
    © 2025 KisaanSaathi — Empowering Farmers with Technology 🌱
</footer>

<script>
/* Theme Toggle */
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("mode", document.body.classList.contains("dark") ? "dark" : "light");
}
if (localStorage.getItem("mode") === "dark") {
    document.body.classList.add("dark");
}

/* Header navigation */
function home(){ window.location.href="index.html"; }

/* Form submit */
function submitForm(event) {
    event.preventDefault();
    document.getElementById("success").style.display = "block";

    // clear the fields
    document.getElementById("name").value = "";
    document.getElementById("contact").value = "";
    document.getElementById("message").value = "";

    return false;
}
</script>
</body>
</html>
