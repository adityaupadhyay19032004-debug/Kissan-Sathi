
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kissan Sathi — Login</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
</head>
<body>
<div class="animated-bg"></div>


<main class="auth-wrap">
<div class="auth-card">
<div class="auth-left">
<img src="/mnt/data/b83f28ac-346c-41c6-b5eb-49ca974d94e7.png" alt="kissan" class="auth-image">
</div>
<div class="auth-right">
<h1>Kissan Sathi</h1>
<p class="muted">Login to access your Farmer Dashboard</p>


<label>Name</label>
<input id="name" placeholder="e.g., Ram Kumar" />


<label>Village</label>
<input id="village" placeholder="e.g., Meerut" />


<label>Phone (optional)</label>
<input id="phone" placeholder="Mobile number" />


<div class="actions">
<button id="loginBtn" class="btn primary">Login</button>
<a href="dashboard.html" id="skipLink" class="link">Skip (demo)</a>
</div>


<p class="small muted">Language: <button id="langBtn" class="btn small">हिंदी</button></p>
</div>
</div>
</main>


<script src="js/auth.js"></script>
</body>
</html>
