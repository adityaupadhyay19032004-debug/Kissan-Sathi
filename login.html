<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | KisaanSaathi</title>

<style>
    :root {
        --bg: #ffffff;
        --text: #1b3c1a;
        --card: #f2fbf3;
        --header: #0f6819;
        --btn-bg: #0f6819;
        --btn-text: #fff;
        --input-bg: #ffffff;
        --input-border: #0f6819;
        --error: #ff3333;
    }
    body.dark {
        --bg: #0d1c0e;
        --text: #e5ffe7;
        --card: #14301a;
        --header: #06230c;
        --btn-bg: #1b8f33;
        --btn-text: #fff;
        --input-bg: #0b1c0e;
        --input-border: #1b8f33;
        --error: #ff726d;
    }

    body { margin: 0; background: var(--bg); color: var(--text); font-family: Arial; transition: .3s; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: var(--header); color: var(--btn-text); }
    header .logo { font-size: 28px; font-weight: bold; cursor: pointer; }
    nav a { margin: 0 18px; color: var(--btn-text); text-decoration: none; font-size: 17px; }
    nav a:hover { text-decoration: underline; }

    .theme-btn {
        background: var(--btn-bg);
        border: none;
        padding: 7px 14px;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        color: var(--btn-text);
        margin-left: 12px;
    }

    .container { max-width: 900px; margin: auto; padding: 55px 20px; }
    h1 { font-size: 42px; text-align: center; }
    p.top-text { text-align: center; margin-bottom: 35px; font-size: 19px; }

    form { background: var(--card); padding: 35px; border-radius: 14px; }
    label { font-size: 18px; display: block; margin-top: 12px; }
    input {
        width: 100%; margin-top: 8px;
        font-size: 18px; padding: 12px;
        border-radius: 8px; border: 2px solid var(--input-border);
        background: var(--input-bg); color: var(--text);
    }

    .btn-submit {
        margin-top: 22px; padding: 14px; font-size: 20px;
        border: none; cursor: pointer; width: 100%;
        border-radius: 10px; background: var(--btn-bg); color: var(--btn-text);
    }
    .btn-submit:hover { opacity: 0.9; }

    .error { color: var(--error); margin-top: 10px; font-size: 18px; text-align: center; display: none; }
    .success { color: green; margin-top: 10px; font-size: 20px; text-align: center; display: none; }

    .bottom-text { margin-top: 20px; text-align: center; font-size: 18px; }
    .bottom-text a { color: var(--btn-bg); text-decoration: none; }
    .bottom-text a:hover { text-decoration: underline; }

    footer { background: var(--header); text-align: center; padding: 18px; color: var(--btn-text); margin-top: 55px; }

    @media(max-width:650px) {
        header { flex-direction: column; padding: 20px; }
        h1 { font-size: 34px; }
    }
</style>
</head>

<body>
<header>
    <div class="logo" onclick="home()">🌾 KisaanSaathi</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <button class="theme-btn" onclick="toggleTheme()">🌙 Dark / ☀ Light</button>
    </nav>
</header>

<div class="container">
    <h1>Welcome Back, Farmer</h1>
    <p class="top-text">Login to access your farming dashboard and insights.</p>

    <form onsubmit="return loginUser(event)">
        <label>Email / Phone</label>
        <input type="text" id="user" required>

        <label>Password</label>
        <input type="password" id="pass" required>

        <button class="btn-submit">Login</button>
    </form>

    <div class="error" id="error">Invalid credentials ❌</div>
    <div class="success" id="success">Login Successful ✔ Redirecting...</div>

    <p class="bottom-text">Don't have an account? <a href="register.html">Register here</a></p>
</div>

<footer>
    © 2025 KisaanSaathi — Empowering Farmers with Technology 🌱
</footer>

<script>
/* Theme Toggle */
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("mode", document.body.classList.contains("dark") ? "dark" : "light");
}
if (localStorage.getItem("mode") === "dark") {
    document.body.classList.add("dark");
}

/* Navigation */
function home(){ window.location.href="index.html"; }

/* Login Logic (frontend only) */
function loginUser(event) {
    event.preventDefault();
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    // Placeholder validation — backend will replace later
    if (u === "" || p === "") {
        document.getElementById("error").style.display = "block";
        document.getElementById("success").style.display = "none";
        return false;
    }

    document.getElementById("error").style.display = "none";
    document.getElementById("success").style.display = "block";

    // Simulated redirect after login
    setTimeout(() => {
        window.location.href = "dashboard.html"; // change later if needed
    }, 1200);

    return false;
}
</script>
</body>
</html>
