<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile | KisaanSaathi</title>

<style>
    :root {
        --bg:#ffffff; --text:#1b3c1a; --sidebar:#0f6819; --card:#e8fbe9;
        --btn:#0f6819; --btn-text:#fff;
    }
    body.dark {
        --bg:#07140a; --text:#d9ffe0; --sidebar:#06230c; --card:#14301a;
        --btn:#1b8f33; --btn-text:#fff;
    }
    body{margin:0;display:flex;font-family:Arial;background:var(--bg);color:var(--text);transition:.3s;}

    .sidebar{width:230px;background:var(--sidebar);padding:20px;position:fixed;height:100vh;}
    .sidebar h2{text-align:center;color:#fff;margin-bottom:35px;}
    .menu a{color:#fff;display:block;padding:14px;border-radius:8px;margin-bottom:6px;text-decoration:none;}
    .menu a:hover,.menu .active{background:#fff;color:var(--sidebar);}

    .main{margin-left:250px;padding:20px;width:calc(100% - 250px);}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
    .top button{background:var(--btn);color:var(--btn-text);padding:7px 14px;border:none;border-radius:6px;cursor:pointer;}

    .profile-box{
        background:var(--card);
        border-radius:18px;
        padding:25px;
        max-width:850px;
        margin:auto;
    }

    .profile-header{display:flex;align-items:center;gap:20px;margin-bottom:25px;}
    .profile-header img{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid var(--btn);}
    .profile-header h1{margin:0;font-size:32px;}

    .detail-row{font-size:20px;margin:13px 0;}
    .label{font-weight:bold;}

    .edit-btn,.save-btn{
        background:var(--btn);color:#fff;padding:12px 20px;
        border:none;border-radius:9px;font-size:18px;
        cursor:pointer;margin-top:15px;width:100%;
    }

    .edit-fields input{
        width:100%;padding:10px;font-size:18px;
        border-radius:8px;border:2px solid var(--btn);
        margin-bottom:15px;background:var(--bg);color:var(--text);
    }

    @media(max-width:650px){
        .sidebar{position:relative;width:100%;height:auto;}
        .main{margin:0;width:100%;}
        .profile-header{flex-direction:column;text-align:center;}
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🌾 KisaanSaathi</h2>
    <div class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="weather.html">Weather</a>
        <a href="crop-health.html">Crop Health</a>
        <a href="mandi.html">Mandi Prices</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<!-- Main -->
<div class="main">
    <div class="top">
        <h2>👤 Farmer Profile</h2>
        <button onclick="toggleTheme()">🌙 / ☀</button>
    </div>

    <div class="profile-box">

        <!-- VIEW MODE -->
        <div id="viewMode">
            <div class="profile-header">
                <img id="photo" src="">
                <h1 id="nameTitle">Farmer Name</h1>
            </div>

            <div class="detail-row"><span class="label">📞 Phone:</span> <span id="phoneText"></span></div>
            <div class="detail-row"><span class="label">✉ Email:</span> <span id="emailText"></span></div>
            <div class="detail-row"><span class="label">📍 Location:</span> <span id="locationText"></span></div>
            <div class="detail-row"><span class="label">🌿 Crops Grown:</span> <span id="cropsText"></span></div>

            <button class="edit-btn" onclick="showEdit()">✏ Edit Profile</button>
        </div>

        <!-- EDIT MODE -->
        <div id="editMode" style="display:none;">
            <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;">
            <label class="save-btn" for="photoInput" style="width:auto;text-align:center;">📷 Upload Photo</label>

            <div class="edit-fields">
                <input id="name" placeholder="Name">
                <input id="phone" placeholder="Phone">
                <input id="email" placeholder="Email">
                <input id="location" placeholder="Location">
                <input id="crops" placeholder="Crops grown">
            </div>

            <button class="save-btn" onclick="saveProfile()">Save</button>
        </div>

    </div>
</div>

<script>
// Theme
function toggleTheme(){
    document.body.classList.toggle("dark");
    localStorage.setItem("mode", document.body.classList.contains("dark") ? "dark" : "light");
}
if(localStorage.getItem("mode")==="dark") document.body.classList.add("dark");

// Load profile
window.onload = () => {
    const data = JSON.parse(localStorage.getItem("profile") || "{}");

    nameTitle.innerText = data.name || "Farmer Name";
    phoneText.innerText = data.phone || "Not provided";
    emailText.innerText = data.email || "Not provided";
    locationText.innerText = data.location || "Not provided";
    cropsText.innerText = data.crops || "Not provided";

    if(data.photo) photo.src = data.photo;
};

// show edit mode
function showEdit(){
    viewMode.style.display = "none";
    editMode.style.display = "block";

    const data = JSON.parse(localStorage.getItem("profile") || "{}");
    name.value = data.name || "";
    phone.value = data.phone || "";
    email.value = data.email || "";
    location.value = data.location || "";
    crops.value = data.crops || "";
}

// save profile
function saveProfile(){
    const profile = {
        name: name.value.trim(),
        phone: phone.value.trim(),
        email: email.value.trim(),
        location: location.value.trim(),
        crops: crops.value.trim(),
        photo: photo.src
    };

    localStorage.setItem("profile", JSON.stringify(profile));

    nameTitle.innerText = profile.name || "Farmer Name";
    phoneText.innerText = profile.phone || "Not provided";
    emailText.innerText = profile.email || "Not provided";
    locationText.innerText = profile.location || "Not provided";
    cropsText.innerText = profile.crops || "Not provided";

    editMode.style.display = "none";
    viewMode.style.display = "block";
}

// photo upload preview
photoInput.addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(file) photo.src = URL.createObjectURL(file);
});
</script>

</body>
</html>
